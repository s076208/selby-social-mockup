<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Prototype</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="topbar">
    <a href="index.html">← Back</a>
    <h2>Selby Instagram Prototype</h2>

    <label class="toggle">
        <input type="checkbox" onclick="toggleIG()">
        <span></span>
    </label>

    <span>Improved Mode</span>
</div>

<div class="profile">

    <div class="header">
        <div class="avatar"></div>
        <div>
            <h2>@selbymv</h2>
            <p>Hardware • DIY • Construction Solutions</p>
        </div>
    </div>

    <div class="stats">
        <div><b>120</b><p>Posts</p></div>
        <div><b>8.5K</b><p>Followers</p></div>
        <div><b>450</b><p>Following</p></div>
    </div>

    <button class="cta">Visit Website</button>

    <div class="stories">
        <div>Deals</div>
        <div>Tools</div>
        <div>Projects</div>
        <div>Delivery</div>
    </div>

    <div id="ig-before" class="grid">

        <div class="box">Post</div>
        <div class="box">Post</div>
        <div class="box">Post</div>
        <div class="box">Post</div>

    </div>

    <div id="ig-after" class="grid hidden">

        <div class="box strong">Product Showcase</div>
        <div class="box strong">DIY Tutorial</div>
        <div class="box strong">Promotion</div>
        <div class="box strong">Customer Story</div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
